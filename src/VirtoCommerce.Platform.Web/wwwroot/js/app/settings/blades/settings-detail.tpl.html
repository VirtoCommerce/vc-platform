<div class="blade-static __bottom" ng-if="blade.isSavingToParentObject" ng-include="'$(Platform)/Scripts/common/templates/ok-cancel2.tpl.html'"></div>
<div class="blade-content">
    <div class="blade-inner">
        <div class="inner-block">
            <form name="formScope" class="form">
                <fieldset ng-repeat="groupName in blade.groupNames" ng-init="setForm(formScope)">
                    <legend>
                        {{groupName==='undefined'?'General':groupName}}
                    </legend>
                    <div class="list __info form-group" ng-repeat="data in blade.currentEntities[groupName]">
                        <label class="form-label settings-property-label">
                          {{ 'settings.' + data.name + '.title' | translate }}
                          <i class="form-ico fa fa-question-circle __link __lightblue" ng-click="data.descrVisible = !data.descrVisible;"></i>
                          <a href="" ng-click="editArray(data);" ng-if="data.isDictionary" class="form-edit"><i class="form-ico fa fa-pencil"></i></a>
                          <span class="settings-reset" ng-if="resetToDefaultValue && !isDefaultValue(data) && data.valueType !== 'Boolean'">
                            <i class="form-ico fa fa-rotate-left __link __blue settings-reset__ico"
                               title="{{ 'platform.blades.settings-detail.reset-to-default' | translate }}"
                               ng-click="$event.preventDefault(); $event.stopPropagation(); data.confirmReset = !data.confirmReset;"></i>
                            <span class="settings-reset__backdrop" ng-if="data.confirmReset"
                                  ng-click="$event.preventDefault(); $event.stopPropagation(); data.confirmReset = false;"></span>
                            <span class="settings-reset__popover" ng-if="data.confirmReset"
                                  ng-click="$event.preventDefault(); $event.stopPropagation();">
                              <span class="settings-reset__text">{{ 'platform.blades.settings-detail.reset-to-default-confirm' | translate }}</span>
                              <span class="settings-reset__actions">
                                <a href="" class="settings-reset__btn"
                                   ng-click="$event.preventDefault(); data.confirmReset = false;">{{ 'platform.blades.settings-detail.reset-confirm-cancel' | translate }}</a>
                                <a href="" class="settings-reset__btn __danger"
                                   ng-click="$event.preventDefault(); data.confirmReset = false; resetToDefaultValue(data);">{{ 'platform.blades.settings-detail.reset-confirm-apply' | translate }}</a>
                              </span>
                            </span>
                          </span>
                        </label>
                        <va-generic-value-input ng-model="data" get-dictionary-values="getDictionaryValues" ng-if="!data.isDictionary && (!data.allowedValues || data.isReadOnly)"></va-generic-value-input>
                        <div class="form-input" ng-if="!data.isDictionary && (data.allowedValues && !data.isReadOnly)">
                            <ui-select ng-model="data.values[0]">
                                <ui-select-match placeholder="{{ 'platform.genericValueInput.placeholders.short-text-dictionary' | translate}}">{{$select.selected.value}}</ui-select-match>
                                <ui-select-choices repeat="propValue in data.allowedValues | filter: {value: $select.search} | orderBy: 'value'">
                                    <span ng-bind-html="propValue.value | highlight: $select.search"></span>
                                </ui-select-choices>
                            </ui-select>
                        </div>
                        <div ng-if="data.descrVisible">
                            <div class="list-descr list-descr-white-space"> {{ 'settings.' + data.name + '.description' | translate }} </div>
                            <a href="" ng-click="data.descrVisible = null;">{{ 'platform.blades.settings-detail.hide-description' | translate}}</a>
                        </div>
                    </div>
                </fieldset>
            </form>
            <va-widget-container group="settingsDetail" blade="blade"></va-widget-container>
        </div>
    </div>
</div>
